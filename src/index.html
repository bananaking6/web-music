<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
        />
        <meta name="apple-mobile-web-app-capable" content="true" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>𝚺 Music</title>
        <link rel="stylesheet" href="./styles/style.css" />
        <link rel="icon" href="/icon.svg" />
    </head>
    <body>
        <canvas id="visualizer"></canvas>
        <div id="bg"></div>
        <div class="time-tooltip" id="timeTooltip">0:00</div>
        <div id="app">
            <main>
                <section id="library" class="view hidden">
                    <div class="library-container">
                        <section id="side-playlists" class="library-section">
                            <h1>Playlists</h1>
                            <section id="playlists"></section>
                            <button onclick="createPlaylist()" class="library-btn">+ New Playlist</button>
                        </section>
                        <section id="side-pinned" class="library-section">
                            <h1>Pinned</h1>
                            <section id="pinned"></section>
                        </section>
                    </div>
                </section>
                <section id="home" class="view">
                    <div class="home-hero">
                        <h2 class="home-title">Welcome to 𝚺 Music</h2>
                        <p class="home-subtitle">
                            Discover and stream your favorite music
                        </p>
                        <div class="home-actions">
                            <button
                                onclick="showView('search')"
                                class="home-button"
                            >
                                🔍 Start Searching
                            </button>
                            <button
                                onclick="openPlaylist('favorites')"
                                class="home-button secondary"
                            >
                                ⭐ View Favorites
                            </button>
                        </div>
                    </div>
                </section>
                <section id="search" class="view hidden">
                    <div class="search-header">
                        <h2>Search</h2>
                        <input
                            id="searchInput"
                            placeholder="Search for artists, songs, albums..."
                        />
                    </div>
                    <div id="searchResults"></div>
                </section>
                <section id="artist" class="view hidden"></section>
                <section id="album" class="view hidden"></section>
                <section id="player" class="view hidden">
                    <div id="playerView" class="player-fullscreen"></div>
                </section>
            </main>
            <nav id="bottomNav" class="bottom-nav">
                <button id="navHome" onclick="showView('home')" class="nav-icon" title="Home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </button>
                <button id="navSearch" onclick="showView('search')" class="nav-icon" title="Search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                    <span>Search</span>
                </button>
                <button id="navLibrary" onclick="showView('library')" class="nav-icon" title="Library">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"></path><line x1="9" y1="9" x2="9" y2="15"></line><line x1="13" y1="9" x2="13" y2="15"></line><line x1="17" y1="9" x2="17" y2="15"></line></svg>
                    <span>Library</span>
                </button>
            </nav>
            <footer class="player-footer" onclick="showView('player')">
                <div class="player-info">
                    <img id="playerCover" alt=" " />
                    <div class="player-text">
                        <div id="playerTitle">
                            <span id="playerTitleSpan">Not playing</span>
                        </div>
                        <div id="playerArtist">No artist</div>
                    </div>
                </div>
                <button class="player-play-btn" onclick="event.stopPropagation(); togglePlay()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </button>
            </footer>
        </div>
        <div id="lyricsView" class="hidden"></div>
        <div id="queueView" class="hidden"></div>
        <div
            id="playlistModal"
            class="hidden"
        >
            <div class="modal-content">
                <h3>Save to Playlist</h3>
                <div
                    id="playlistList"
                    style="max-height: 300px; overflow-y: auto"
                ></div>
                <div class="modal-actions">
                    <button
                        class="modal-btn cancel"
                        onclick="closePlaylistModal()"
                    >
                        Done
                    </button>
                    <button
                        class="modal-btn create hidden"
                        onclick="createNewPlaylistFromModal()"
                    >
                        + New Playlist
                    </button>
                </div>
            </div>
        </div>
        <audio id="audio" crossorigin="anonymous"></audio>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
