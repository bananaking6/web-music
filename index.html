<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
        />
        <meta name="apple-mobile-web-app-capable" content="true" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <title>𝚺 Music</title>
        <link rel="icon" href="./icon.svg" />
      <script type="module" crossorigin src="./assets/index-Cz2RE553.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/index-DB5t3KLQ.css">
    </head>
    <body>
        <canvas id="visualizer"></canvas>
        <div id="bg"></div>
        <div class="time-tooltip" id="timeTooltip">0:00</div>
        <div id="app">
            <nav id="topNav" class="top-nav">
                <div onclick="showView('home')" class="nav-brand">𝚺 Music</div>
                <div class="nav-links">
                    <button id="navHome" onclick="showView('home')" title="Home">
                        Home
                    </button>
                    <button
                        id="navSearch"
                        onclick="showView('search')"
                        title="Search"
                    >
                        Search
                    </button>
                    <button
                        id="navLibrary"
                        onclick="showView('library')"
                        title="Library"
                    >
                        Library
                    </button>
                </div>
            </nav>
            <main>
                <section id="library" class="view hidden">
                    <div class="library-container">
                        <section id="side-left" class="library-left-section">
                            <section id="side-playlists" class="library-section">
                                <h1>
                                    Playlists
                                    <button id="newPlaylistBtn" style="float: right; font-size: 0.8rem; padding: 2px 8px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--color-text-muted); cursor: pointer; border-radius: 4px;" onclick="createPlaylistAndRefresh()">+ New</button>
                                </h1>
                                <section id="playlists"></section>
                            </section>
                            <section id="side-artists" class="library-section">
                                <h1>Pinned Artists</h1>
                                <section id="artists"></section>
                            </section>
                            <section id="side-albums" class="library-section">
                                <h1>Pinned Albums</h1>
                                <section id="albums"></section>
                            </section>
                        </section>
                        <section id="side-right" class="library-right-section">
                            <section id="side-history" class="library-section">
                                <section id="side-queue" class="library-section">
                                    <h1>
                                        Queue
                                        <button id="addToPlaylistBtn" style="float: right; font-size: 0.8rem; padding: 2px 8px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--color-text-muted); cursor: pointer; border-radius: 4px;" onclick="addCurrentTrackToPlaylist()">+ Add</button>
                                    </h1>
                                <section id="libraryQueue"></section>
                            </section>
                                <h1>
                                    History
                                    <button id="clearHistoryBtn" style="float: right; font-size: 0.8rem; padding: 2px 8px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--color-text-muted); cursor: pointer; border-radius: 4px;" onclick="clearHistory()">Clear</button>
                                </h1>
                                <section id="history"></section>
                            </section>
                        </section>
                    </div>
                </section>
                <section id="home" class="view">
                    <div class="home-hero">
                        <h2 class="home-title">Welcome to 𝚺 Music</h2>
                        <p class="home-subtitle">
                            Discover and stream your favorite music
                        </p>
                        <div class="home-actions">
                            <button
                                onclick="showView('search')"
                                class="home-button"
                            >
                                Start Searching
                            </button>
                            <button
                                id="transferBtn"
                                class="home-button secondary"
                                title="Import playlist from Spotify/Apple Music"
                            >
                                Transfer Playlist
                            </button>
                        </div>
                    </div>
                </section>
                <section id="search" class="view hidden">
                    <div class="search-header">
                        <h2>Search</h2>
                        <input
                            id="searchInput"
                            placeholder="Search for artists, songs, albums..."
                        />
                    </div>
                    <div id="searchResults"></div>
                </section>
                <section id="artist" class="view hidden"></section>
                <section id="album" class="view hidden"></section>
            </main>
            <footer class="player-footer">
                <div class="player-seek-container">
                    <div class="seek-bar" id="seekBar">
                        <div class="buffer-bar" id="bufferBar"></div>
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>

                <div class="player-info">
                    <img id="playerCover" alt=" " />
                    <div id="playerTitle">
                        <span id="playerTitleSpan"></span
                        ><img id="playerExplicit" src="./e.svg" />
                    </div>
                    <div id="playerArtist"></div>
                </div>

                <div class="player-controls">
                    <span
                        id="currentTime"
                        style="
                            font-size: 12px;
                            margin-right: 15px;
                            color: #b3b3b3;
                            font-variant-numeric: tabular-nums;
                        "
                        >0:00</span
                    >
                    <button onclick="prev()" title="Previous">
                        <svg
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polygon points="19 20 9 12 19 4 19 20"></polygon>
                            <line x1="5" y1="19" x2="5" y2="5"></line>
                        </svg>
                    </button>
                    <button onclick="togglePlay()" title="Play/Pause">
                        <svg
                            width="40"
                            height="40"
                            viewBox="0 0 24 24"
                            fill="currentColor"
                        >
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <button onclick="next()" title="Next">
                        <svg
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polygon points="5 4 15 12 5 20 5 4"></polygon>
                            <line x1="19" y1="5" x2="19" y2="19"></line>
                        </svg>
                    </button>
                    <span
                        id="totalTime"
                        style="
                            font-size: 12px;
                            margin-left: 15px;
                            color: #b3b3b3;
                            font-variant-numeric: tabular-nums;
                        "
                        >0:00</span
                    >
                </div>

                <div style="display: flex; align-items: center; gap: 15px">
                    <div style="display: flex; align-items: center; gap: 8px">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        </svg>
                        <input
                            type="range"
                            id="volumeSlider"
                            min="0"
                            max="100"
                            value="100"
                            style="width: 80px; cursor: pointer"
                        />
                    </div>
                    <button
                        onclick="reverseAudio()"
                        title="Reverse"
                        id="reverseBtn"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M21 7v6h-6"></path>
                            <path
                                d="M3 17a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 7"
                            ></path>
                        </svg>
                    </button>
                    <button onclick="toggleLyrics()" title="Lyrics">
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
                            ></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button onclick="toggleQueue()" title="Queue">
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>
                    <button
                        onclick="openAddToPlaylistModal()"
                        title="Add to Playlist"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <button onclick="downloadTrack()" title="Download">
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                            ></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
            </footer>
        </div>
        <div id="lyricsView" class="hidden"></div>
        <div id="queueView" class="hidden"></div>
        <div
            id="playlistModal"
            class="hidden"
        >
            <div class="modal-content">
                <h3>Save to Playlist</h3>
                <div
                    id="playlistList"
                    style="max-height: 300px; overflow-y: auto"
                ></div>
                <div class="modal-actions">
                    <button
                        class="modal-btn cancel"
                        onclick="closePlaylistModal()"
                    >
                        Done
                    </button>
                    <button
                        class="modal-btn create hidden"
                        onclick="createNewPlaylistFromModal()"
                    >
                        + New Playlist
                    </button>
                </div>
            </div>
        </div>
        <audio id="audio" crossorigin="anonymous"></audio>
    </body>
</html>
